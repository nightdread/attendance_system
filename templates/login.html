<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Система учета времени</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
  <link href="/static/css/design.css" rel="stylesheet">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: var(--bg-page); }
    .login-card { width: 100%; max-width: 380px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 2rem; }
    .login-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin: 0 0 0.5rem 0; text-align: center; }
    .login-subtitle { font-size: var(--text-body); color: var(--text-secondary); text-align: center; margin: 0 0 1.5rem 0; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.375rem; font-weight: 500; color: var(--text-primary); font-size: var(--text-sm); }
    .login-btn { width: 100%; padding: 0.75rem 1rem; font-size: 1rem; font-weight: 600; border-radius: var(--radius-sm); background: var(--accent); color: white; border: none; cursor: pointer; transition: background var(--duration) var(--ease-out), transform 0.1s ease; }
    .login-btn:hover { background: var(--accent-hover); }
    .login-btn:active { transform: scale(0.98); }
    .login-error { margin-top: 1rem; padding: 0.75rem; border-radius: var(--radius-sm); background: var(--danger-muted); color: var(--danger); font-size: var(--text-sm); text-align: center; }
    .theme-toggle-login { position: fixed; top: 1rem; right: 1rem; width: 40px; height: 40px; border-radius: var(--radius-sm); border: none; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; box-shadow: var(--shadow); }
  </style>
</head>
<body class="login-page">
  <button type="button" id="theme-toggle-login" class="theme-toggle-login" aria-label="Тема">🌓</button>
  <div class="login-card">
    <h1 class="login-title">Система учета времени</h1>
    <p class="login-subtitle">Войдите в свой аккаунт</p>
    <form method="post">
      <input type="hidden" name="next_url" value="{{ next_url or '/terminal' }}">
      {% if csrf_token %}<input type="hidden" name="csrf_token" value="{{ csrf_token }}">{% endif %}
      <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" class="input" required placeholder="Введите логин" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" class="input" required placeholder="Введите пароль" autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn">Войти</button>
    </form>
    {% if error %}
    <div class="login-error" role="alert">{{ error }}</div>
    {% endif %}
  </div>
  <script>
    (function() {
      var key = 'attendance-theme';
      var stored = localStorage.getItem(key) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark', stored === 'dark');
      document.getElementById('theme-toggle-login').addEventListener('click', function() {
        var next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
        document.documentElement.classList.toggle('dark', next === 'dark');
        localStorage.setItem(key, next);
      });
    })();
  </script>
</body>
</html>
