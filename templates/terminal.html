{% extends "base.html" %}
{% block title %}Терминал — Система учета{% endblock %}
{% block extra_head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
.terminal-qr-card { max-width: 560px; margin: 0 auto; }
.qr-code { margin: 1.5rem 0; display: inline-block; border: 3px solid var(--border); border-radius: var(--radius); padding: 1rem; background: #000; }
.qr-code #qrcode { background: #fff; padding: 0.5rem; border-radius: 4px; }
.token-info { background: var(--bg-elevated); padding: 1.25rem; border-radius: var(--radius); margin-top: 1rem; border: 1px solid var(--border); }
.token-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.token-value { font-family: ui-monospace, monospace; font-size: 0.9rem; word-break: break-all; flex: 1; min-width: 0; }
.update-time { text-align: center; font-size: var(--text-sm); color: var(--text-muted); margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.terminal-status { text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: var(--text-sm); }
.bot-link-btn { display: inline-block; margin-top: 0.5rem; color: var(--accent); font-weight: 500; }
.bot-link-btn:hover { text-decoration: underline; }
</style>
{% endblock %}
{% block content %}
<div class="terminal-qr-card card">
  <div class="text-center">
    <h2 class="text-xl font-bold mb-4">Система учета посещаемости</h2>
    <div class="qr-code">
      <div id="qrcode"></div>
    </div>
    <div class="token-info">
      <div class="token-row">
        <span class="text-[var(--text-muted)] text-sm">Токен:</span>
        <span id="current-token" class="token-value">Загрузка...</span>
        <button type="button" class="btn btn-outline btn-sm" id="copy-token-btn">Копировать</button>
      </div>
      <a href="#" id="open-bot-link" class="bot-link-btn" target="_blank" rel="noopener noreferrer">Перейти к боту</a>
      <div class="update-time">Обновлено: <span id="last-update">—</span></div>
    </div>
  </div>
  <div class="terminal-status" id="status">Загрузка QR-кода...</div>
</div>

<script>
var currentToken = null;
var qrCode = null;
var updateInterval = {{ update_interval }};
var botUrl = null;
function updateQRCode() {
  document.getElementById('status').textContent = 'Обновление...';
  fetch('/api/active_token', { credentials: 'include' }).then(function(r) { return r.json(); }).then(function(data) {
    if (!data.token) { document.getElementById('status').textContent = 'Не удалось получить токен'; return; }
    var newToken = data.token;
    var url = data.url;
    botUrl = data.bot_url || url;
    if (newToken !== currentToken) {
      currentToken = newToken;
      document.getElementById('qrcode').innerHTML = '';
      qrCode = new QRCode(document.getElementById('qrcode'), { text: url, width: 256, height: 256, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
    }
    document.getElementById('current-token').textContent = newToken;
    var link = document.getElementById('open-bot-link');
    if (link && botUrl) link.href = botUrl;
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
    document.getElementById('status').textContent = 'QR-код готов для сканирования';
  }).catch(function() { document.getElementById('status').textContent = 'Ошибка обновления'; });
}
updateQRCode();
setInterval(updateQRCode, updateInterval);
document.getElementById('copy-token-btn').addEventListener('click', function() {
  var t = document.getElementById('current-token').textContent.trim();
  if (!t || t === 'Загрузка...') return;
  navigator.clipboard.writeText(t).then(function() {
    document.getElementById('status').textContent = 'Скопировано';
    setTimeout(function() { document.getElementById('status').textContent = 'QR-код готов для сканирования'; }, 1500);
  }).catch(function() { document.getElementById('status').textContent = 'Не удалось скопировать'; });
});
</script>
{% endblock %}
